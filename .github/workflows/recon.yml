name: Axiom Multi-Scanner
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

jobs:
  multi-recon:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Hacking Tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "/home/runner/go/bin" >> $GITHUB_PATH

      - name: Run Optimized Scan
        run: |
          TARGETS=("monzo.com" "stockx.com" "lyst.com" "nordsecurity.com" "flickr.com")
          
          for DOMAIN in "${TARGETS[@]}"; do
            echo "--- Scanning $DOMAIN ---"
            # 1. Quick Discovery
            # 2. Limit to top 30 subdomains to ensure we finish fast
            # 3. Only look for Medium, High, and Critical bugs (the ones that pay)
            subfinder -d $DOMAIN -silent | httpx -silent | head -n 30 > temp_live.txt
            nuclei -l temp_live.txt -rl 20 -bs 5 -severity medium,high,critical >> findings.txt
            rm temp_live.txt
          done

      - name: Save Findings
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Axiom-Scanner-Bot"
          git add findings.txt
          git commit -m "Results for 5 Targets - $(date)" || echo "No changes"
          git push
