- name: Run Optimized Scan
        run: |
          TARGETS=("monzo.com" "stockx.com" "lyst.com" "nordsecurity.com" "flickr.com")
          
          for DOMAIN in "${TARGETS[@]}"; do
            echo "--- Scanning $DOMAIN ---"
            
            # 1. Probe for REAL web servers only (Skip the ghosts)
            # -p 80,443 ensures we only talk to standard web ports
            subfinder -d $DOMAIN -silent | httpx -silent -p 80,443 -rl 50 | head -n 25 > temp_live.txt
            
            # 2. Turbo-charged Nuclei
            # -nm (no-mismatch): Skips hosts that don't match the template tech
            # -hm (host-max-errors): If a host fails 10 times, we ABANDON it immediately
            # -concurrency 50: Scan more templates at once
            nuclei -l temp_live.txt \
                   -severity medium,high,critical \
                   -rl 30 -bs 10 -c 50 \
                   -nm -hm 10 -timeout 2 \
                   >> findings.txt
            
            rm temp_live.txt
          done
