- name: Run Multi-Target Scan
        run: |
          TARGETS=("monzo.com" "stockx.com" "lyst.com" "nordsecurity.com" "flickr.com")
          
          for DOMAIN in "${TARGETS[@]}"; do
            echo "--- Scanning $DOMAIN ---"
            
            # 1. Faster Discovery
            subfinder -d $DOMAIN -silent -o temp_subs.txt
            
            # 2. Filter live assets and limit to top 20 to ensure we finish
            cat temp_subs.txt | httpx -silent -rl 50 | head -n 20 > temp_live.txt
            
            # 3. Optimized Scanning
            # Added -severity medium,high,critical to skip low-priority info logs
            # Added -timeout 3 to skip hanging servers faster
            # Increased -rl to 20 for a better balance
            nuclei -l temp_live.txt -rl 20 -bs 5 -timeout 3 -severity medium,high,critical >> findings.txt
            
            rm temp_subs.txt temp_live.txt
          done
